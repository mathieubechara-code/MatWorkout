<script>
/*
 * Storage shim: the original app was built for an environment that provides an
 * async window.storage.{get,set,delete,list} API. Here on a plain static page
 * (e.g. GitHub Pages) we back that same interface with localStorage, so the app
 * logic above didn't need to change at all. Data lives only in this browser.
 */
window.storage = {
  async get(key, shared) {
    try {
      const raw = localStorage.getItem(key);
      if (raw === null || raw === undefined) return null;
      return { key, value: raw, shared: !!shared };
    } catch (e) { return null; }
  },
  async set(key, value, shared) {
    try {
      localStorage.setItem(key, value);
      return { key, value, shared: !!shared };
    } catch (e) { return null; }
  },
  async delete(key, shared) {
    try {
      const existed = localStorage.getItem(key) !== null;
      localStorage.removeItem(key);
      return { key, deleted: existed, shared: !!shared };
    } catch (e) { return null; }
  },
  async list(prefix, shared) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || (k && k.startsWith(prefix))) keys.push(k);
      }
      return { keys, prefix, shared: !!shared };
    } catch (e) { return null; }
  },
};
</script>

function matchExercise(header) {
  const norm = header.toLowerCase().replace(/[^a-z0-9 ]/g, " ").replace(/\s+/g, " ").trim();
  let best = null, bestLen = 0;
  EXERCISES.forEach((canon) => {
    const aliases = EXERCISE_ALIASES[canon] || [canon.toLowerCase()];
    aliases.forEach((alias) => {
      if (norm.includes(alias) && alias.length > bestLen) { best = canon; bestLen = alias.length; }
    });
  });
  return best;
}

// Parses a freeform pasted summary: exercise header lines followed by one "N rep x M sets ..." line
// per set-group (M repeats of N reps), blank lines and "super set" markers are ignored separators.
function parseFreeform(text) {
  const lines = text.split("\n").map((l) => l.trim());
  const setLineRe = /^(\d+)\s*reps?\s*x\s*(\d+)\s*sets?\s*(.*)$/i;
  const supersetRe = /^super\s*set$/i;
  const results = {};
  const unmatched = [];
  let current = null;
  lines.forEach((raw) => {
    if (!raw || supersetRe.test(raw)) return;
    const setMatch = raw.match(setLineRe);
    if (setMatch) {
      if (current) {
        const reps = parseInt(setMatch[1], 10);
        const setsCount = parseInt(setMatch[2], 10) || 1;
        const rest = setMatch[3] || "";
        const kgMatch = rest.match(/(\d+(?:\.\d+)?)\s*kg/i);
        if (!results[current]) results[current] = { reps: [], load: 0 };
        for (let i = 0; i < setsCount; i++) results[current].reps.push(reps);
        if (kgMatch) results[current].load = parseFloat(kgMatch[1]);
      }
      return;
    }
    const header = raw.replace(/:\s*$/, "").trim();
    const canon = matchExercise(header);
    if (canon) { current = canon; if (!results[current]) results[current] = { reps: [], load: 0 }; }
    else { current = null; if (header) unmatched.push(header); }
  });
  return { results, unmatched };
}

function TrainingLog() {
  const [sessions, setSessions] = useState(null);
  const [tab, setTab] = useState("dashboard");

  const [metric, setMetric] = useState("reps");

  const [editingId, setEditingId] = useState(null);
  const [saving, setSaving] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [draft, setDraft] = useState(emptyDraft);
  const [pasteText, setPasteText] = useState("");
  const [parseNote, setParseNote] = useState("");
  const [selectedCompare, setSelectedCompare] = useState([]);
  const [showCompare, setShowCompare] = useState(false);
  const [importMsg, setImportMsg] = useState("");
  const [isMobile, setIsMobile] = useState(typeof window !== "undefined" ? window.innerWidth < 560 : false);

  const [editingTarget, setEditingTarget] = useState(false);

  const [selectedHeatDate, setSelectedHeatDate] = useState(null);
  const [chartFocus, setChartFocus] = useState(null);
  const TARGET_KEY = "target-settings-v1";
  const fileInputRef = useRef(null);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 560);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY, false);
        if (res && res.value) {
          const migrated = migrate(JSON.parse(res.value));
          setSessions(migrated);
          await window.storage.set(STORAGE_KEY, JSON.stringify(migrated), false);
        } else {
          setSessions(SEED_SESSIONS);
          await window.storage.set(STORAGE_KEY, JSON.stringify(SEED_SESSIONS), false);
        }
      } catch (e) {
        setSessions(SEED_SESSIONS);
        try { await window.storage.set(STORAGE_KEY, JSON.stringify(SEED_SESSIONS), false); } catch (_) {}
      }
    })();
  }, []);

    };

  };

  const doDelete = async (id) => {
    await persist(sessions.filter((s) => s.id !== id));

  const startEdit = (s) => {

  const handleParseFill = () => {
    const { results, unmatched } = parseFreeform(pasteText);
    const matchedNames = Object.keys(results);
    if (!matchedNames.length) {

    }
    setDraft((d) => {
      const nextEx = { ...d.ex };
      const nextLoad = { ...d.load };
      matchedNames.forEach((name) => {
        nextEx[name] = results[name].reps.join(",");
        if (results[name].load > 0) nextLoad[name] = String(results[name].load);
      });
      return { ...d, ex: nextEx, load: nextLoad };
    });
    const notes = [];
    if (matchedNames.includes("Goblet Squat")) notes.push('Mapped to the retired Goblet Squat field — edit to Bulgarian Split Squat below if that\'s what you meant.');
    if (unmatched.length) notes.push(`Couldn't match: ${unmatched.join(", ")} — enter those manually below.`);
    setParseNote(notes.join(" ") || "Filled in below — review before saving.");
    setPasteText("");
  };

  const saveSession = async () => {
    if (!sessions) return;
    setSaving(true);
    const exData = {}; const loadData = {};
    EXERCISES.forEach((name) => {
      const parsed = draft.ex[name].split(",").map((v) => parseInt(v.trim(), 10)).filter((n) => Number.isFinite(n) && n >= 0);
      if (parsed.length) exData[name] = parsed;
      const l = parseFloat(draft.load[name]);
      if (Number.isFinite(l) && l > 0) loadData[name] = l;
    });
    const bw = parseFloat(draft.bodyweight);
    let next;
    if (editingId) {
      next = sessions.map((s) => s.id === editingId
        ? { ...s, date: draft.date, label: draft.label.trim() || "Session", bodyweight: Number.isFinite(bw) ? bw : null, load: loadData, ex: exData, notes: draft.notes.trim() }
        : s);
    } else {
      const newSession = { id: "s" + Date.now(), date: draft.date, label: draft.label.trim() || "Session", bodyweight: Number.isFinite(bw) ? bw : null, load: loadData, ex: exData, notes: draft.notes.trim() };
      next = [...sessions, newSession];
    }
    next = next.sort((a, b) => a.date.localeCompare(b.date));
    await persist(next);
    cancelForm();
    setSaving(false);
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(sessions, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "training-log-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  const exportCSV = () => {
    const rows = [["date", "label", "bodyweight_kg", "exercise", "reps_per_set", "added_kg", "total_reps", "notes"]];
    sessions.forEach((s) => {
      EXERCISES.forEach((name) => {
        if (!s.ex[name]) return;
        rows.push([s.date, s.label, s.bodyweight ?? "", name, s.ex[name].join("-"), (s.load || {})[name] || 0, total(s.ex[name]), s.notes || ""]);
      });
    });
    const csv = rows.map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "training-log-" + new Date().toISOString().slice(0, 10) + ".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!Array.isArray(parsed)) throw new Error("not an array");
        const existingDates = new Set(sessions.map((s) => s.date));
        const toAdd = migrate(parsed.filter((s) => s && s.date && s.ex && !existingDates.has(s.date)));
        const skipped = parsed.length - toAdd.length;
        const next = [...sessions, ...toAdd].sort((a, b) => a.date.localeCompare(b.date));
        await persist(next);
        setImportMsg(`Imported ${toAdd.length} session(s)${skipped ? `, skipped ${skipped} duplicate date(s)` : ""}.`);
      } catch (err) {
        setImportMsg("Import failed — file doesn't look like a valid export.");
      }
      if (fileInputRef.current) fileInputRef.current.value = "";
      setTimeout(() => setImportMsg(""), 6000);
    };
    reader.readAsText(file);
  };

  const todayStr = toISODate(new Date());

  // Which exercises are "loadable" is detected from your actual data — any exercise that has
  // ever had added weight logged against it gets load-aware charts + hypertrophy coaching.
  const loadableSet = useMemo(() => {
    const s = new Set();
    (sessions || []).forEach((sess) => {
      EXERCISES.forEach((name) => { if ((sess.load || {})[name] > 0) s.add(name); });
    });
    return s;
  }, [sessions]);

  // Carries the last logged bodyweight forward for any session where it wasn't entered,
  // so volume/PR math doesn't silently break just because bodyweight was left blank that day.
  const bwMap = useMemo(() => {
    const map = {};
    let last = null;
    (sessions || []).forEach((s) => {
      if (s.bodyweight != null) last = s.bodyweight;
      map[s.id] = last;
    });
    return map;
  }, [sessions]);

  const effLoadPerRep = (s, name) => {
    const bw = bwMap[s.id];
    return bw == null ? null : bw + ((s.load || {})[name] || 0);
  };

  const rangedSessions = useMemo(() => {
    if (!sessions) return [];
    if (range === "all") return sessions;
    const days = range === "30" ? 30 : 90;
    return sessions.filter((s) => dayDiff(s.date, todayStr) <= days);
  }, [sessions, range]);

  const chartData = useMemo(() => rangedSessions.map((s) => {
    const row = { date: fmtDate(s.date), fullDate: s.date };
    let totalVol = 0, anyVol = false;
    EXERCISES.forEach((name) => {
      if (!s.ex[name]) { row[name] = null; return; }
      const reps = total(s.ex[name]);
      if (metric === "reps") { row[name] = reps; return; }
      const lpr = effLoadPerRep(s, name);
      const v = lpr == null ? null : Math.round(reps * lpr);
      row[name] = v;
      if (v != null) { totalVol += v; anyVol = true; }
    });
    if (metric === "volume") row.Total = anyVol ? totalVol : null;
    return row;
  }), [rangedSessions, metric]);

  const perSetData = useMemo(() => {
    if (filter === "All" || filter.startsWith("group:")) return [];
    return rangedSessions.filter((s) => s.ex[filter]).map((s) => {
      const row = { date: fmtDate(s.date) };
      const lpr = effLoadPerRep(s, filter);
      s.ex[filter].forEach((r, i) => { row["Set " + (i + 1)] = metric === "reps" ? r : (lpr == null ? null : Math.round(r * lpr)); });
      row.Total = metric === "reps" ? total(s.ex[filter]) : (lpr == null ? null : Math.round(total(s.ex[filter]) * lpr));
      return row;
    });
  }, [rangedSessions, filter, metric]);

  const loadStepData = useMemo(() => {
    if (!loadableSet.has(filter)) return [];
    return rangedSessions.filter((s) => s.ex[filter]).map((s) => ({ date: fmtDate(s.date), "Added load (kg)": (s.load || {})[filter] || 0 }));
  }, [rangedSessions, filter, loadableSet]);

  const bodyweightData = useMemo(() => rangedSessions.filter((s) => s.bodyweight != null).map((s) => ({ date: fmtDate(s.date), kg: s.bodyweight })), [rangedSessions]);

  const groupChartData = useMemo(() => {
    if (!filter.startsWith("group:")) return [];
    const group = filter.slice(6);
    return rangedSessions
      .filter((s) => EXERCISES.some((name) => MUSCLE_GROUP[name] === group && s.ex[name]))
      .map((s) => {
        let val = 0;
        EXERCISES.forEach((name) => {
          if (MUSCLE_GROUP[name] !== group || !s.ex[name]) return;
          const reps = total(s.ex[name]);
          if (metric === "reps") { val += reps; return; }
          const lpr = effLoadPerRep(s, name);
          if (lpr != null) val += reps * lpr;
        });
        return { date: fmtDate(s.date), value: Math.round(val) };
      });
  }, [rangedSessions, filter, metric]);

  const maxSets = useMemo(() => ((filter === "All" || filter.startsWith("group:")) ? 0 : Math.max(0, ...rangedSessions.map((s) => (s.ex[filter] || []).length))), [rangedSessions, filter]);

  // The muscle group tied to the currently selected exercise (or group filter), used to
  // highlight the matching row in the "Volume by muscle group" panel.
  const activeGroup = filter === "All" ? null : filter.startsWith("group:") ? filter.slice(6) : MUSCLE_GROUP[filter] || null;

  const latest = sessions && sessions.length ? sessions[sessions.length - 1] : null;
  const first = sessions && sessions.length ? sessions[0] : null;

  const deltaFor = (name) => {
    if (!latest || !first || !latest.ex[name] || !first.ex[name]) return null;
    return total(latest.ex[name]) - total(first.ex[name]);
  };

  const sessionVolume = (s) => EXERCISES.reduce((sum, name) => {
    if (!s.ex[name]) return sum;
    const lpr = effLoadPerRep(s, name);
    return lpr == null ? sum : sum + total(s.ex[name]) * lpr;
  }, 0);

  const volumeKpi = useMemo(() => {
    if (!sessions || !latest || !first) return null;
    const latestVol = sessionVolume(latest);
    const firstVol = sessionVolume(first);
    const cumulative = sessions.reduce((sum, s) => sum + sessionVolume(s), 0);
    return { latestVol, delta: latestVol - firstVol, cumulative };
  }, [sessions, latest, first]);

  const groupVolumeLatest = useMemo(() => {
    if (!latest) return [];
    const totals = {}; GROUPS.forEach((g) => (totals[g] = 0));
    EXERCISES.forEach((name) => {
      if (!latest.ex[name]) return;
      const lpr = effLoadPerRep(latest, name);
      if (lpr == null) return;
      totals[MUSCLE_GROUP[name]] += total(latest.ex[name]) * lpr;
    });
    const grand = Object.values(totals).reduce((a, b) => a + b, 0) || 1;
    return GROUPS.map((g) => ({ group: g, kg: Math.round(totals[g]), pct: Math.round((totals[g] / grand) * 100) }));
  }, [latest]);

  const prMap = useMemo(() => {
    if (!sessions) return {};
    const map = {};
    EXERCISES.forEach((name) => {
      let bestVol = -1, bestVolDate = null, bestVolReps = null, priorBest = -1;
      sessions.forEach((s) => {
        if (!s.ex[name]) return;
        const lpr = effLoadPerRep(s, name);
        if (lpr == null) return; // no bodyweight logged for this session — volume unknown, skip
        const setVols = s.ex[name].map((r) => r * lpr);
        const maxInSession = Math.max(...setVols);
        const maxIdx = setVols.indexOf(maxInSession);
        if (!latest || s.id !== latest.id) { if (maxInSession > priorBest) priorBest = maxInSession; }
        if (maxInSession > bestVol) { bestVol = maxInSession; bestVolDate = s.date; bestVolReps = s.ex[name][maxIdx]; }
      });
      const latestLpr = latest ? effLoadPerRep(latest, name) : null;
      const latestSetVols = latest && latest.ex[name] && latestLpr != null ? latest.ex[name].map((r) => r * latestLpr) : null;
      const latestMax = latestSetVols ? Math.max(...latestSetVols) : -1;
      map[name] = { bestVol, bestVolDate, bestVolReps, isNewPR: latest && latestMax > priorBest && latestMax === bestVol };
    });
    return map;
  }, [sessions, latest]);

  const consistency = useMemo(() => {
    if (!sessions || sessions.length === 0) return null;
    const weekKeySet = new Set(sessions.map((s) => toISODate(mondayOf(s.date))));
    const currentMonday = mondayOf(todayStr);
    let streak = 0, firstIter = true;
    let cursor = new Date(currentMonday);
    for (let i = 0; i < 104; i++) {
      const key = toISODate(cursor);
      if (weekKeySet.has(key)) streak++;
      else if (!firstIter) break;
      firstIter = false;
      cursor.setDate(cursor.getDate() - 7);
    }
    const firstMonday = mondayOf(sessions[0].date);
    const weeksSpan = Math.max(1, Math.round((currentMonday - firstMonday) / (7 * 86400000)) + 1);
    const avgPerWeek = (sessions.length / weeksSpan).toFixed(1);
    const thisWeekKey = toISODate(currentMonday);
    const thisWeekCount = sessions.filter((s) => toISODate(mondayOf(s.date)) === thisWeekKey).length;
    const daysSinceLast = dayDiff(sessions[sessions.length - 1].date, todayStr);
    return { streak, avgPerWeek, thisWeekCount, daysSinceLast };
  }, [sessions]);

  const twelveWeekTarget = useMemo(() => {
    if (!sessions || sessions.length === 0 || !first) return null;
    const goalWeeks = (targetSettings && targetSettings.weeks) || 12;
    const startDate = (targetSettings && targetSettings.startDate) || first.date;
    const startMonday = mondayOf(startDate);
    const currentMonday = mondayOf(todayStr);
    const weekKeySet = new Set(sessions.map((s) => toISODate(mondayOf(s.date))));
    let cursor = new Date(startMonday);
    let missedWeeks = 0, trainedWeeks = 0;
    while (cursor < currentMonday) {
      const key = toISODate(cursor);
      if (weekKeySet.has(key)) trainedWeeks++; else missedWeeks++;
      cursor.setDate(cursor.getDate() + 7);
    }
    if (weekKeySet.has(toISODate(currentMonday)) && currentMonday >= startMonday) trainedWeeks++;
    const targetDate = new Date(startMonday);
    targetDate.setDate(targetDate.getDate() + (goalWeeks + missedWeeks) * 7);
    const targetISO = toISODate(targetDate);
    const daysRemaining = Math.max(0, dayDiff(todayStr, targetISO));
    const trainedCapped = Math.min(goalWeeks, trainedWeeks);
    return { targetDate: targetISO, daysRemaining, trainedWeeks: trainedCapped, goalWeeks, missedWeeks, reached: trainedWeeks >= goalWeeks };
  }, [sessions, first, todayStr, targetSettings]);

  const HEATMAP_WEEKS = 24;

  const heatmapWeeks = useMemo(() => {
    if (!sessions) return [];
    const sessionByDate = {};
    sessions.forEach((s) => { sessionByDate[s.date] = s; });
    const currentMonday = mondayOf(todayStr);
    const weeks = [];
    for (let w = HEATMAP_WEEKS - 1; w >= 0; w--) {
      const weekStart = new Date(currentMonday); weekStart.setDate(weekStart.getDate() - w * 7);
      const days = [];
      for (let d = 0; d < 7; d++) {
        const day = new Date(weekStart); day.setDate(day.getDate() + d);
        const iso = toISODate(day);
        days.push({ date: iso, trained: !!sessionByDate[iso], isFuture: iso > todayStr });
      }
      weeks.push(days);
    }
    return weeks;
  }, [sessions]);

  if (!sessions) {
    return <div style={{ background: "#101214", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#8a8f98", fontFamily: "monospace" }}>loading log…</div>;
  }

  const setColor = (i) => ["#F2C94C", "#E63946", "#56CCF2", "#6FCF97"][i % 4];
  const yLabel = metric === "reps" ? "reps" : "kg";

  const changeFilter = (f) => { setFilter(f); setChartFocus(null); };

  const toggleCompare = (id) => {
    setSelectedCompare((sc) => {
      if (sc.includes(id)) return sc.filter((x) => x !== id);
      if (sc.length >= 2) return [sc[1], id];
      return [...sc, id];
    });
  };

  const compareSessions = selectedCompare.length === 2 ? selectedCompare.map((id) => sessions.find((s) => s.id === id)).sort((a, b) => a.date.localeCompare(b.date)) : null;

  return (
    <div style={{ background: "#101214", minHeight: "100vh", color: "#E8E6E1", fontFamily: "'Inter', 'Helvetica Neue', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
        .disp { font-family: 'Oswald', sans-serif; letter-spacing: 0.02em; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .pill { transition: all 0.15s ease; }
        .pill:hover { transform: translateY(-1px); }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2a2e33; border-radius: 3px; }
        input[type="text"], input[type="date"], input[type="number"], textarea { color-scheme: dark; }
        textarea { font-family: 'Inter', sans-serif; resize: vertical; }
        .file-btn { position: relative; overflow: hidden; }
        .file-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        @media (max-width: 560px) {
          button, .file-btn, input[type="checkbox"] { min-height: 40px; }
          .pill { padding: 8px 12px !important; font-size: 12.5px !important; }
        }
      `}</style>

      {/* Header */}
      <div style={{ borderBottom: "1px solid #22262b", padding: isMobile ? "14px 12px 0" : "20px 16px 0" }}>
        <div style={{ maxWidth: 1060, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
            <Dumbbell size={20} color="#F2C94C" strokeWidth={2.2} />
            <span className="mono" style={{ fontSize: 11, letterSpacing: "0.15em", color: "#8a8f98", textTransform: "uppercase" }}>Calisthenics · Training Log</span>
          </div>
          <h1 className="disp" style={{ fontSize: "clamp(24px, 6vw, 32px)", fontWeight: 700, margin: "0 0 4px", color: "#F5F3EE", display: "flex", alignItems: "center", gap: 10 }}>
            Mathieu's workout progression
            <span className="mono" style={{ fontSize: 11, fontWeight: 700, color: "#101214", background: "#F2C94C", borderRadius: 999, padding: "2px 9px", letterSpacing: "0.03em" }}>v2</span>
          </h1>
          <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
            <span style={{ fontSize: 13, color: "#9a9fa6", fontWeight: 600 }}>{sessions.length} Sessions Logged</span>
            <span className="mono" style={{ fontSize: 12, color: "#6b7078" }}>{first ? fmtDateFull(first.date) : ""} → {latest ? fmtDateFull(latest.date) : ""}</span>
          </div>
          <div style={{ display: "flex", gap: 2, overflowX: "auto" }}>
            {TABS.map(({ id, label, Icon }) => (
              <button key={id} onClick={() => setTab(id)} style={{
                display: "flex", alignItems: "center", gap: 6, cursor: "pointer", background: "none", border: "none", whiteSpace: "nowrap",
                padding: "9px 12px", fontSize: 12.5, fontWeight: 600, color: tab === id ? "#F2C94C" : "#6b7078",
                borderBottom: tab === id ? "2px solid #F2C94C" : "2px solid transparent", fontFamily: "'Inter', sans-serif",
              }}>
                <Icon size={14} /> {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: isMobile ? "14px 12px" : "18px 16px" }}>

        {tab === "dashboard" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 12, marginBottom: 18 }}>
              <div style={{ background: "#16181b", border: "1px solid #22262b", borderRadius: 12, padding: 16 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                  <Weight size={14} color="#F2C94C" />
                  <span style={{ fontSize: 11, color: "#8a8f98", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>Volume Load — latest</span>
                </div>
                <div className="disp" style={{ fontSize: 24, fontWeight: 700, color: "#F5F3EE" }}>
                  {volumeKpi ? Math.round(volumeKpi.latestVol).toLocaleString() : "—"} <span className="mono" style={{ fontSize: 12, color: "#6b7078" }}>kg</span>
                </div>
                <div style={{ fontSize: 11, color: volumeKpi && volumeKpi.delta >= 0 ? "#6FCF97" : "#E63946", marginTop: 4 }}>
                  {volumeKpi ? (volumeKpi.delta >= 0 ? "+" : "") + Math.round(volumeKpi.delta).toLocaleString() + " kg vs " + fmtDate(first.date) : ""}
                </div>
                <div style={{ fontSize: 11, color: "#4a4f56", marginTop: 4 }} className="mono">{volumeKpi ? Math.round(volumeKpi.cumulative).toLocaleString() : ""} kg lifetime</div>
              </div>

              <div style={{ background: "#16181b", border: "1px solid #22262b", borderRadius: 12, padding: 16 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                  <Award size={14} color="#F2C94C" />
                  <span style={{ fontSize: 11, color: "#8a8f98", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>PRs (best set volume, all-time)</span>
                </div>
                <div style={{ display: "grid", gap: 4 }}>
                  {EXERCISES.map((name) => {
                    const pr = prMap[name];
                    if (!pr || pr.bestVol < 0) return null;
                    return (
                      <div key={name} style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                        <span style={{ color: "#9a9fa6" }}>{name.split(" ")[0]}</span>
                        <span className="mono" style={{ color: pr.isNewPR ? "#F2C94C" : "#c9cdd3", fontWeight: pr.isNewPR ? 700 : 400 }}>{Math.round(pr.bestVol)}kg <span style={{ color: "#5a5f66" }}>({pr.bestVolReps}r)</span>{pr.isNewPR ? " 🔥 new" : ""}</span>
                      </div>
                    );
                  })}
                </div>
                <div style={{ fontSize: 10, color: "#4a4f56", marginTop: 8 }} className="mono">volume = reps × (bodyweight + added load) for your single best set</div>
              </div>

              <div style={{ background: "#16181b", border: "1px solid #22262b", borderRadius: 12, padding: 16 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                  <Flame size={14} color="#F2C94C" />
                  <span style={{ fontSize: 11, color: "#8a8f98", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>Consistency</span>
                </div>
                {consistency && (
                  <div style={{ display: "grid", gap: 6 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}><span style={{ color: "#9a9fa6" }}>Streak (wks w/ ≥1)</span><span className="mono" style={{ color: "#F5F3EE", fontWeight: 700 }}>{consistency.streak}</span></div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}><span style={{ color: "#9a9fa6" }}>This week</span><span className="mono" style={{ color: "#F5F3EE" }}>{consistency.thisWeekCount}</span></div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}><span style={{ color: "#9a9fa6" }}>Avg / week</span><span className="mono" style={{ color: "#F5F3EE" }}>{consistency.avgPerWeek}</span></div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}><span style={{ color: "#9a9fa6" }}>Last session</span><span className="mono" style={{ color: "#F5F3EE" }}>{consistency.daysSinceLast === 0 ? "today" : consistency.daysSinceLast + "d ago"}</span></div>
                  </div>
                )}
              </div>
              <div style={{ background: "#16181b", border: "1px solid #22262b", borderRadius: 12, padding: 16 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <Target size={14} color="#F2C94C" />
                    <span style={{ fontSize: 11, color: "#8a8f98", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>{twelveWeekTarget ? twelveWeekTarget.goalWeeks : 12}-Week Target</span>
                  </div>
                  <Settings2
                    size={13}
                    color="#5a5f66"
                    style={{ cursor: "pointer" }}
                    onClick={() => {
                      setTargetDraft({ startDate: (targetSettings && targetSettings.startDate) || (first ? first.date : ""), weeks: String((targetSettings && targetSettings.weeks) || 12) });
                      setEditingTarget(true);
                    }}
                  />
                </div>
                {editingTarget ? (
                  <div style={{ display: "grid", gap: 8 }}>
                    <div>
                      <div style={{ fontSize: 10, color: "#5a5f66", marginBottom: 3 }}>Start date</div>
                      <input type="date" value={targetDraft.startDate} onChange={(e) => setTargetDraft({ ...targetDraft, startDate: e.target.value })} style={{ width: "100%", background: "#101214", border: "1px solid #2a2e33", borderRadius: 6, padding: "6px 8px", color: "#E8E6E1", fontSize: 12, boxSizing: "border-box" }} />
                    </div>
                    <div>
                      <div style={{ fontSize: 10, color: "#5a5f66", marginBottom: 3 }}>Weeks</div>
                      <input type="number" min="1" value={targetDraft.weeks} onChange={(e) => setTargetDraft({ ...targetDraft, weeks: e.target.value })} className="mono" style={{ width: "100%", background: "#101214", border: "1px solid #2a2e33", borderRadius: 6, padding: "6px 8px", color: "#E8E6E1", fontSize: 12, boxSizing: "border-box" }} />
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={saveTargetSettings} style={{ flex: 1, background: "#F2C94C", color: "#101214", border: "none", borderRadius: 6, padding: "6px 0", fontWeight: 700, fontSize: 11.5, cursor: "pointer" }}>Save</button>
                      <button onClick={() => setEditingTarget(false)} style={{ flex: 1, background: "transparent", color: "#9a9fa6", border: "1px solid #2a2e33", borderRadius: 6, padding: "6px 0", fontWeight: 600, fontSize: 11.5, cursor: "pointer" }}>Cancel</button>
                    </div>
                  </div>
                ) : twelveWeekTarget && (
                  twelveWeekTarget.reached ? (
                    <>
                      <div className="disp" style={{ fontSize: 22, fontWeight: 700, color: "#6FCF97" }}>Goal reached 🎉</div>
                      <div style={{ fontSize: 11, color: "#6b7078", marginTop: 4 }}>{twelveWeekTarget.goalWeeks}/{twelveWeekTarget.goalWeeks} trained weeks — hit on {fmtDate(twelveWeekTarget.targetDate)}</div>
                    </>
                  ) : (
                    <>
                      <div className="disp" style={{ fontSize: 24, fontWeight: 700, color: "#F5F3EE" }}>
                        {twelveWeekTarget.daysRemaining} <span className="mono" style={{ fontSize: 12, color: "#6b7078" }}>days left</span>
                      </div>
                      <div style={{ fontSize: 11, color: "#9a9fa6", marginTop: 4 }}>Target: {fmtDateFull(twelveWeekTarget.targetDate)}</div>
                      <div style={{ fontSize: 11, color: "#6b7078", marginTop: 2 }} className="mono">{twelveWeekTarget.trainedWeeks}/{twelveWeekTarget.goalWeeks} weeks trained{twelveWeekTarget.missedWeeks > 0 ? ` · +${twelveWeekTarget.missedWeeks}wk pushed (missed)` : ""}</div>
                    </>
                  )
                )}
              </div>
            </div>

            <div style={{ background: "#16181b", border: "1px solid #22262b", borderRadius: 12, padding: 16, marginBottom: 18 }}>
              <div style={{ marginBottom: 10 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: "#c9cdd3" }}>Last 24 weeks — days trained</span>
              </div>
              <div style={{ display: "flex", gap: isMobile ? 2 : 4, overflowX: "auto", paddingBottom: 4 }}>
                <div style={{ display: "grid", gridTemplateRows: `repeat(7, ${isMobile ? 12 : 14}px)`, gap: isMobile ? 2 : 4, marginRight: 4, flexShrink: 0 }}>
                  {["M", "T", "W", "T", "F", "S", "D"].map((d, i) => (
                    <span key={i} className="mono" style={{ fontSize: 9, color: "#4a4f56", lineHeight: `${isMobile ? 12 : 14}px` }}>{d}</span>

                        <Pencil size={14} style={{ cursor: "pointer", color: "#5a5f66" }} onClick={() => startEdit(s)} />
                        <Trash2 size={15} style={{ cursor: "pointer", color: "#5a5f66" }} onClick={() => setConfirmDelete(s)} />
                      </div>
                    </div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {EXERCISES.filter((n) => s.ex[n]).map((name) => (
                        <span key={name} className="mono" style={{ fontSize: 11, padding: "3px 8px", borderRadius: 6, background: `${COLORS[name]}14`, color: COLORS[name], border: `1px solid ${COLORS[name]}33` }}>{name.split(" ")[0]}: {s.ex[name].join("-")}{(s.load || {})[name] ? ` (+${s.load[name]}kg)` : ""}</span>
                      ))}
                    </div>
                    {s.notes && <div style={{ fontSize: 11.5, color: "#6b7078", fontStyle: "italic", marginTop: 6 }}>"{s.notes}"</div>}
                  </div>
                ))}
              </div>
            </div>
          </>
        )}

        <div style={{ textAlign: "center", padding: "20px 0 4px", fontSize: 11, color: "#4a4f56" }} className="mono">Data saved automatically · visible only to you</div>
      </div>

      {confirmDelete && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }}>
          <div style={{ background: "#16181b", border: "1px solid #2a2e33", borderRadius: 14, padding: 20, maxWidth: 360, width: "100%" }}>
            <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
              <AlertTriangle size={20} color="#E63946" style={{ flexShrink: 0 }} />
              <div><div style={{ fontWeight: 700, fontSize: 14, color: "#F5F3EE", marginBottom: 4 }}>Delete this session?</div><div style={{ fontSize: 12.5, color: "#9a9fa6" }}>{fmtDateFull(confirmDelete.date)} — "{confirmDelete.label}" will be permanently removed. This can't be undone.</div></div>
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setConfirmDelete(null)} style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #2a2e33", background: "transparent", color: "#c9cdd3", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
              <button onClick={() => doDelete(confirmDelete.id)} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "#E63946", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {selectedHeatDate && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }} onClick={() => setSelectedHeatDate(null)}>
          <div style={{ background: "#16181b", border: "1px solid #2a2e33", borderRadius: 14, padding: "20px 28px" }} onClick={(e) => e.stopPropagation()}>
            <div className="disp" style={{ fontSize: 20, fontWeight: 700, color: "#F5F3EE" }}>{fmtDateFull(selectedHeatDate)}</div>
          </div>
        </div>
      )}

      {showCompare && compareSessions && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }} onClick={() => setShowCompare(false)}>
          <div style={{ background: "#16181b", border: "1px solid #2a2e33", borderRadius: 14, padding: 20, maxWidth: 560, width: "100%", maxHeight: "80vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <span style={{ fontWeight: 700, fontSize: 15, color: "#F5F3EE" }}>Session comparison</span>
              <X size={18} style={{ cursor: "pointer", color: "#8a8f98" }} onClick={() => setShowCompare(false)} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#6b7078", marginBottom: 12 }}>
              <span className="mono">{fmtDateFull(compareSessions[0].date)}</span><span className="mono">{fmtDateFull(compareSessions[1].date)}</span>
            </div>
            {compareSessions[0].bodyweight != null && compareSessions[1].bodyweight != null && (
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, padding: "8px 0", borderBottom: "1px solid #22262b", marginBottom: 8 }}>
                <span style={{ color: "#9a9fa6" }}>Bodyweight</span>
                <span className="mono" style={{ color: "#F5F3EE" }}>{compareSessions[0].bodyweight}kg → {compareSessions[1].bodyweight}kg ({(compareSessions[1].bodyweight - compareSessions[0].bodyweight >= 0 ? "+" : "") + (compareSessions[1].bodyweight - compareSessions[0].bodyweight).toFixed(1)}kg)</span>
              </div>
            )}
            <div style={{ display: "grid", gap: 10 }}>
              {EXERCISES.filter((name) => compareSessions[0].ex[name] || compareSessions[1].ex[name]).map((name) => {
                const a = compareSessions[0], b = compareSessions[1];
                const repsA = a.ex[name] ? total(a.ex[name]) : null, repsB = b.ex[name] ? total(b.ex[name]) : null;
                const volA = a.ex[name] && effLoadPerRep(a, name) != null ? Math.round(repsA * effLoadPerRep(a, name)) : null;
                const volB = b.ex[name] && effLoadPerRep(b, name) != null ? Math.round(repsB * effLoadPerRep(b, name)) : null;
                return (
                  <div key={name} style={{ padding: "10px 0", borderBottom: "1px solid #1d2024" }}>
                    <div style={{ fontSize: 12.5, fontWeight: 700, color: COLORS[name], marginBottom: 6 }}>{name}</div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#c9cdd3", marginBottom: 3 }}>
                      <span>{a.ex[name] ? a.ex[name].join("-") : "—"}</span>
                      <span className="mono">{repsA != null && repsB != null ? ((repsB - repsA >= 0 ? "+" : "") + (repsB - repsA) + " reps") : ""}</span>
                      <span>{b.ex[name] ? b.ex[name].join("-") : "—"}</span>
                    </div>
                    {volA != null && volB != null && (<div style={{ fontSize: 11, color: "#6b7078", textAlign: "right" }}>{volA}kg → {volB}kg ({(volB - volA >= 0 ? "+" : "") + (volB - volA)}kg)</div>)}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TrainingLog />);

</script>
</body>
</html>
