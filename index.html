// ---- window.storage polyfill backed by localStorage (persists per-browser on GitHub Pages) ----
window.storage = {
  async get(key, shared) {
    try {
      const raw = localStorage.getItem(key);
      if (raw === null) return null;
      return { key, value: raw, shared: !!shared };
    } catch (e) { return null; }
  },
  async set(key, value, shared) {
    try {
      localStorage.setItem(key, value);
      return { key, value, shared: !!shared };
    } catch (e) { return null; }
  },
  async delete(key, shared) {
    try {
      localStorage.removeItem(key);
      return { key, deleted: true, shared: !!shared };
    } catch (e) { return null; }
  },
  async list(prefix, shared) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || (k && k.startsWith(prefix))) keys.push(k);
      }
      return { keys, prefix, shared: !!shared };
    } catch (e) { return null; }
  },
};

function levenshtein(a, b) {
  if (a === b) return 0;
  const m = a.length, n = b.length;
  if (!m) return n;
  if (!n) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
    }
  }
  return dp[m][n];
}

// Fuzzy-matches a pasted header line against the full exercise reference library — not just
// your 7 tracked fields — so both typos and exercises you haven't logged before get
// recognized. Tries exact alias substrings first (longest alias wins), then falls back to
// edit-distance matching for typos (e.g. "wide grip pul ups").
function matchExercise(header, library) {
  const lib = library || EXERCISE_LIBRARY;
  const norm = header.toLowerCase().replace(/[^a-z0-9 ]/g, " ").replace(/\s+/g, " ").trim();
  if (!norm) return null;
  let best = null, bestLen = 0;
  lib.forEach((entry) => {
    (entry.aliases || [entry.name.toLowerCase()]).forEach((alias) => {
      if (norm.includes(alias) && alias.length > bestLen) { best = entry; bestLen = alias.length; }
    });
  });
  if (best) return best;
  let bestFuzzy = null, bestDist = Infinity;
  lib.forEach((entry) => {
    (entry.aliases || [entry.name.toLowerCase()]).forEach((alias) => {
      const dist = levenshtein(norm, alias);
      const tolerance = Math.max(1, Math.floor(alias.length * 0.22));
      if (dist <= tolerance && dist < bestDist) { bestFuzzy = entry; bestDist = dist; }
    });
  });
  return bestFuzzy;
}

// Parses a freeform pasted summary. Supports two paste styles:
//   1. Two-line: a header line ("Push-Ups"), then one "N rep(s) x M set(s) ..." line per
//      set-group (M repeats of N reps). Blank lines and "super set" markers are ignored.
//   2. Single-line shorthand: "Exercise : N x M" on one line (e.g. "biceps curl : 12 x 4") —
//      the "rep(s)"/"set(s)" words are optional in both styles, so "12 x 4" alone also counts
//      as a valid set line, not just "12 reps x 4 sets".
// Headers are matched against the FULL exercise reference library (not a fixed 5-6 field
// subset) plus any custom exercises the user has added — so any recognized exercise gets
// filled in and auto-added to the tracked list, whether or not it's ever been logged before.
// Only headers that truly don't match anything in the library land in `unmatched`.
function parseFreeform(text, library) {
  const lines = text.split("\n").map((l) => l.trim());
  const setLineRe = /^(\d+)\s*(?:reps?)?\s*x\s*(\d+)\s*(?:sets?)?\s*(.*)$/i;
  const supersetRe = /^super\s*set$/i;
  const results = {};
  const matchedEntries = [];
  const unmatched = [];
  let current = null; // matched library entry | null

  const applySetMatch = (name, setMatch) => {
    const reps = parseInt(setMatch[1], 10);
    const setsCount = parseInt(setMatch[2], 10) || 1;
    const rest = setMatch[3] || "";
    const kgMatch = rest.match(/(\d+(?:\.\d+)?)\s*kg/i);
    if (!results[name]) results[name] = { reps: [], load: 0 };
    for (let i = 0; i < setsCount; i++) results[name].reps.push(reps);
    if (kgMatch) results[name].load = parseFloat(kgMatch[1]);
  };

  lines.forEach((raw) => {
    if (!raw || supersetRe.test(raw)) return;

    // Single-line shorthand: split on the FIRST colon and see if the right side alone reads
    // as a set line ("N x M ..."). If so, the left side is the exercise name for THIS line
    // only — no need for a following line.
    const colonIdx = raw.indexOf(":");
    if (colonIdx !== -1) {
      const left = raw.slice(0, colonIdx).trim();
      const right = raw.slice(colonIdx + 1).trim();
      const rightSetMatch = right.match(setLineRe);
      if (left && rightSetMatch) {
        const entry = matchExercise(left, library);
        if (entry) {
          current = entry;
          if (!matchedEntries.some((r) => r.name === entry.name)) matchedEntries.push(entry);
          applySetMatch(entry.name, rightSetMatch);
        } else {
          current = null;
          unmatched.push(left);
        }
        return;
      }
    }

    const setMatch = raw.match(setLineRe);
    if (setMatch) {
      if (current) applySetMatch(current.name, setMatch);
      return;
    }
    const header = raw.replace(/:\s*$/, "").trim();
    const entry = matchExercise(header, library);
    if (entry) {
      current = entry;
      if (!matchedEntries.some((r) => r.name === entry.name)) matchedEntries.push(entry);
    } else {
      current = null;
      if (header) unmatched.push(header);
    }
  });
  return { results, matchedEntries, unmatched };
}

          const migrated = migrate(JSON.parse(res.value));
          setSessions(migrated);
          await window.storage.set(STORAGE_KEY, JSON.stringify(migrated), false);
        } else {
          setSessions(SEED_SESSIONS);
          await window.storage.set(STORAGE_KEY, JSON.stringify(SEED_SESSIONS), false);
        }
      } catch (e) {
        setSessions(SEED_SESSIONS);
        try { await window.storage.set(STORAGE_KEY, JSON.stringify(SEED_SESSIONS), false); } catch (_) {}
      }
    })();
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(TARGET_KEY, false);
        setTargetSettings(res && res.value ? JSON.parse(res.value) : {});
      } catch (e) {
        setTargetSettings({});
      }
    })();
  }, []);

  // Which exercises currently have a field in the entry form. Starts empty — nothing is
  // hardcoded — and grows automatically as pasted workouts are recognized, or manually via
  // "Add exercise".
  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(TRACKED_KEY, false);
        setTrackedExercises(res && res.value ? JSON.parse(res.value) : []);
      } catch (e) {
        setTrackedExercises([]);
      }
    })();
  }, []);

  // Custom exercises the user has defined that aren't in the built-in reference library.
  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(CUSTOM_LIB_KEY, false);
        setCustomExercises(res && res.value ? JSON.parse(res.value) : []);
      } catch (e) {
        setCustomExercises([]);
      }
    })();
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(OWNER_KEY, false);
        setOwnerName(res && res.value ? res.value : "");
      } catch (e) {
        setOwnerName("");
      }
    })();
  }, []);

  const persistTracked = async (next) => {
    setTrackedExercises(next);
    try { await window.storage.set(TRACKED_KEY, JSON.stringify(next), false); } catch (_) {}
  };

  const persistCustom = async (next) => {
    setCustomExercises(next);
    try { await window.storage.set(CUSTOM_LIB_KEY, JSON.stringify(next), false); } catch (_) {}
  };

  const saveOwnerName = async () => {
    const trimmed = nameDraft.trim();
    setOwnerName(trimmed);
    setEditingName(false);
    try { await window.storage.set(OWNER_KEY, trimmed, false); } catch (_) {}
  };

  // Full matchable library = built-in reference exercises + anything the user has added
  // manually that isn't in the built-in list.
  const fullLibrary = useMemo(() => [...EXERCISE_LIBRARY, ...customExercises], [customExercises]);
  const colorsMap = useMemo(() => {
    const map = { ...COLORS };
    customExercises.forEach((e, i) => { map[e.name] = e.color || colorForIndex(EXERCISE_LIBRARY.length + i); });
    return map;
  }, [customExercises]);
  const muscleGroupMap = useMemo(() => {
    const map = { ...MUSCLE_GROUP };
    customExercises.forEach((e) => { map[e.name] = e.group; });
    return map;
  }, [customExercises]);
  const bwRatioMap = useMemo(() => {
    const map = { ...BW_RATIO };
    customExercises.forEach((e) => { map[e.name] = e.ratio; });
    return map;
  }, [customExercises]);

  // Exercises to actually draw on the charts/summary tiles. Deliberately NOT the same as
  // `trackedExercises` (which only controls which fields show in the "new session" form) —
  // that list lives in its own storage key and can fall out of sync with what's actually in
  // your saved sessions (e.g. after a paste-parse on a device where the tracked list didn't
  // load, or an import). Union the two and order library exercises first so charts always
  // reflect what you've actually logged, even if the tracked list is empty or stale.
  const chartExercises = useMemo(() => {
    const loggedNames = new Set();
    (sessions || []).forEach((s) => Object.keys(s.ex || {}).forEach((n) => loggedNames.add(n)));
    const all = new Set([...trackedExercises, ...loggedNames]);
    const libOrder = fullLibrary.map((e) => e.name);
    return Array.from(all).sort((a, b) => {
      const ia = libOrder.indexOf(a), ib = libOrder.indexOf(b);
      if (ia === -1 && ib === -1) return a.localeCompare(b);
      if (ia === -1) return 1;
      if (ib === -1) return -1;
      return ia - ib;
    });
  }, [sessions, trackedExercises, fullLibrary]);

  const doDeleteAllLogs = async () => {
    await persist([]);
    setSelectedCompare([]);
    setConfirmDeleteAll(false);
  };

  const addCustomExercise = async () => {
    const name = addExDraft.name.trim();
    if (!name) return;
    const ratioNum = parseFloat(addExDraft.ratio);
    const entry = {
      name,
      group: addExDraft.group,
      ratio: Number.isFinite(ratioNum) ? ratioNum : 1.0,
      aliases: [name.toLowerCase()],
    };
    const nextCustom = [...customExercises.filter((e) => e.name !== name), entry];
    await persistCustom(nextCustom);
    if (!trackedExercises.includes(name)) await persistTracked([...trackedExercises, name]);
    setDraft((d) => ({ ...d, ex: { ...d.ex, [name]: d.ex[name] ?? "" }, load: { ...d.load, [name]: d.load[name] ?? "" } }));
    setAddExDraft({ name: "", group: "Pull", ratio: "1.0" });
    setShowAddExercise(false);
  };

  const trackLibraryExercise = async (name) => {
    if (!trackedExercises.includes(name)) await persistTracked([...trackedExercises, name]);
    setDraft((d) => ({ ...d, ex: { ...d.ex, [name]: d.ex[name] ?? "" }, load: { ...d.load, [name]: d.load[name] ?? "" } }));
  };

  const persist = async (next) => {
    setSessions(next);
    try { await window.storage.set(STORAGE_KEY, JSON.stringify(next), false); } catch (_) {}
  };

  const saveTargetSettings = async () => {
    const weeksNum = parseInt(targetDraft.weeks, 10);
    const next = {
      startDate: targetDraft.startDate || null,
      weeks: Number.isFinite(weeksNum) && weeksNum > 0 ? weeksNum : 12,
    };
    setTargetSettings(next);
    setEditingTarget(false);
    try { await window.storage.set(TARGET_KEY, JSON.stringify(next), false); } catch (_) {}
  };

  const doDelete = async (id) => {
    await persist(sessions.filter((s) => s.id !== id));
    setSelectedCompare((sc) => sc.filter((x) => x !== id));
    setConfirmDelete(null);
  };

  const startEdit = (s) => {
    setEditingId(s.id);
    // Include every exercise the session actually has data for (even if it's since been
    // untracked) plus all currently tracked fields, so nothing gets silently dropped on save.
    const namesForEdit = Array.from(new Set([...trackedExercises, ...Object.keys(s.ex)]));
    setDraft({
      date: s.date, label: s.label, bodyweight: s.bodyweight != null ? String(s.bodyweight) : "", notes: s.notes || "",
      ex: Object.fromEntries(namesForEdit.map((e) => [e, s.ex[e] ? s.ex[e].join(",") : ""])),
      load: Object.fromEntries(namesForEdit.map((e) => [e, (s.load || {})[e] ? String(s.load[e]) : ""])),
    });
    setShowForm(true);
  };

  const cancelForm = () => { setShowForm(false); setEditingId(null); setDraft(emptyDraft(trackedExercises)); setPasteText(""); setParseNote(""); };

  const handleParseFill = async () => {
    const { results, matchedEntries, unmatched } = parseFreeform(pasteText, fullLibrary);
    const matchedNames = Object.keys(results);
    if (!matchedNames.length && !matchedEntries.length) {
      setParseNote('Couldn\'t parse anything — check the format (e.g. "12 rep x 3 sets body weight").');
      return;
    }
    // Any recognized exercise — from the full library, not just your prior tracked fields —
    // is added to the tracked list automatically so it gets a real field going forward.
    const newlyTracked = matchedEntries.map((e) => e.name).filter((name) => !trackedExercises.includes(name));
    if (newlyTracked.length) await persistTracked([...trackedExercises, ...newlyTracked]);
    setDraft((d) => {
      const nextEx = { ...d.ex };
      const nextLoad = { ...d.load };
      matchedNames.forEach((name) => {
        nextEx[name] = results[name].reps.join(",");
        if (results[name].load > 0) nextLoad[name] = String(results[name].load);
      });
      matchedEntries.forEach((e) => {
        if (nextEx[e.name] === undefined) nextEx[e.name] = "";
        if (nextLoad[e.name] === undefined) nextLoad[e.name] = "";
      });
      return { ...d, ex: nextEx, load: nextLoad };
    });
    const notes = [];
    if (newlyTracked.length) notes.push(`Now tracking: ${newlyTracked.join(", ")}.`);
    if (unmatched.length) notes.push(`Couldn't match at all: ${unmatched.join(", ")} — use "Add exercise" below or enter it manually.`);
    setParseNote(notes.join(" ") || "Filled in below — review before saving.");
    setPasteText("");
  };

  const saveSession = async () => {
    if (!sessions) return;
    setSaving(true);
    const exData = {}; const loadData = {};
    Object.keys(draft.ex).forEach((name) => {
      const parsed = draft.ex[name].split(",").map((v) => parseInt(v.trim(), 10)).filter((n) => Number.isFinite(n) && n >= 0);
      if (parsed.length) exData[name] = parsed;
      const l = parseFloat(draft.load[name]);
      if (Number.isFinite(l) && l > 0) loadData[name] = l;
    });
    const bw = parseFloat(draft.bodyweight);
    let next;
    if (editingId) {
      next = sessions.map((s) => s.id === editingId
        ? { ...s, date: draft.date, label: draft.label.trim() || "Session", bodyweight: Number.isFinite(bw) ? bw : null, load: loadData, ex: exData, notes: draft.notes.trim() }
        : s);
    } else {
      const newSession = { id: "s" + Date.now(), date: draft.date, label: draft.label.trim() || "Session", bodyweight: Number.isFinite(bw) ? bw : null, load: loadData, ex: exData, notes: draft.notes.trim() };
      next = [...sessions, newSession];
    }
    next = next.sort((a, b) => a.date.localeCompare(b.date));
    await persist(next);
    cancelForm();
    setSaving(false);
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(sessions, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "training-log-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  const exportCSV = () => {
    const rows = [["date", "label", "bodyweight_kg", "exercise", "reps_per_set", "added_kg", "total_reps", "notes"]];
    sessions.forEach((s) => {
      Object.keys(s.ex).forEach((name) => {
        if (!s.ex[name]) return;
        rows.push([s.date, s.label, s.bodyweight ?? "", name, s.ex[name].join("-"), (s.load || {})[name] || 0, total(s.ex[name]), s.notes || ""]);
      });
    });
    const csv = rows.map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "training-log-" + new Date().toISOString().slice(0, 10) + ".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!Array.isArray(parsed)) throw new Error("not an array");
        const existingDates = new Set(sessions.map((s) => s.date));
        const toAdd = migrate(parsed.filter((s) => s && s.date && s.ex && !existingDates.has(s.date)));
        const skipped = parsed.length - toAdd.length;
        const next = [...sessions, ...toAdd].sort((a, b) => a.date.localeCompare(b.date));
        await persist(next);
        setImportMsg(`Imported ${toAdd.length} session(s)${skipped ? `, skipped ${skipped} duplicate date(s)` : ""}.`);
      } catch (err) {
        setImportMsg("Import failed — file doesn't look like a valid export.");
      }
      if (fileInputRef.current) fileInputRef.current.value = "";
      setTimeout(() => setImportMsg(""), 6000);
    };
    reader.readAsText(file);
  };

  const todayStr = toISODate(new Date());

  // Which exercises are "loadable" is detected from your actual data — any exercise that has
  // ever had added weight logged against it gets load-aware charts + hypertrophy coaching.
  const loadableSet = useMemo(() => {
    const s = new Set();
    (sessions || []).forEach((sess) => {
      Object.keys(sess.load || {}).forEach((name) => { if ((sess.load || {})[name] > 0) s.add(name); });
    });
    return s;
  }, [sessions]);

  // Carries the last logged bodyweight forward for any session where it wasn't entered,
  // so volume/PR math doesn't silently break just because bodyweight was left blank that day.
  const bwMap = useMemo(() => {
    const map = {};
    let last = null;
    (sessions || []).forEach((s) => {
      if (s.bodyweight != null) last = s.bodyweight;
      map[s.id] = last;
    });
    return map;
  }, [sessions]);

  const effLoadPerRep = (s, name) => {
    const bw = bwMap[s.id];
    if (bw == null) return null;
    const ratio = bwRatioMap[name] != null ? bwRatioMap[name] : 1;
    return bw * ratio + ((s.load || {})[name] || 0);
  };

  const rangedSessions = useMemo(() => {
    if (!sessions) return [];
    if (range === "all") return sessions;
    const days = range === "30" ? 30 : 90;
    return sessions.filter((s) => dayDiff(s.date, todayStr) <= days);
  }, [sessions, range]);

  const chartData = useMemo(() => rangedSessions.map((s) => {
    const row = { date: fmtDate(s.date), fullDate: s.date };
    let totalVol = 0, anyVol = false;
    chartExercises.forEach((name) => {
      if (!s.ex[name]) { row[name] = null; return; }
      const reps = total(s.ex[name]);
      if (metric === "reps") { row[name] = reps; return; }
      const lpr = effLoadPerRep(s, name);
      const v = lpr == null ? null : Math.round(reps * lpr);
      row[name] = v;
      if (v != null) { totalVol += v; anyVol = true; }
    });
    if (metric === "volume") row.Total = anyVol ? totalVol : null;
    return row;
  }), [rangedSessions, metric, chartExercises]);

  const perSetData = useMemo(() => {
    if (filter === "All" || filter.startsWith("group:")) return [];
    return rangedSessions.filter((s) => s.ex[filter]).map((s) => {
      const row = { date: fmtDate(s.date) };
      const lpr = effLoadPerRep(s, filter);
      s.ex[filter].forEach((r, i) => { row["Set " + (i + 1)] = metric === "reps" ? r : (lpr == null ? null : Math.round(r * lpr)); });
      row.Total = metric === "reps" ? total(s.ex[filter]) : (lpr == null ? null : Math.round(total(s.ex[filter]) * lpr));
      return row;
    });
  }, [rangedSessions, filter, metric]);

  const loadStepData = useMemo(() => {
    if (!loadableSet.has(filter)) return [];
    return rangedSessions.filter((s) => s.ex[filter]).map((s) => ({ date: fmtDate(s.date), "Added load (kg)": (s.load || {})[filter] || 0 }));
  }, [rangedSessions, filter, loadableSet]);

  const bodyweightData = useMemo(() => rangedSessions.filter((s) => s.bodyweight != null).map((s) => ({ date: fmtDate(s.date), kg: s.bodyweight })), [rangedSessions]);

  const groupChartData = useMemo(() => {
    if (!filter.startsWith("group:")) return [];
    const group = filter.slice(6);
    return rangedSessions
      .filter((s) => chartExercises.some((name) => muscleGroupMap[name] === group && s.ex[name]))
      .map((s) => {
        let val = 0;
        chartExercises.forEach((name) => {
          if (muscleGroupMap[name] !== group || !s.ex[name]) return;
          const reps = total(s.ex[name]);
          if (metric === "reps") { val += reps; return; }
          const lpr = effLoadPerRep(s, name);
          if (lpr != null) val += reps * lpr;
        });
        return { date: fmtDate(s.date), value: Math.round(val) };
      });
  }, [rangedSessions, filter, metric, chartExercises, muscleGroupMap]);

  const maxSets = useMemo(() => ((filter === "All" || filter.startsWith("group:")) ? 0 : Math.max(0, ...rangedSessions.map((s) => (s.ex[filter] || []).length))), [rangedSessions, filter]);

  // The muscle group tied to the currently selected exercise (or group filter), used to
  // highlight the matching row in the "Volume by muscle group" panel.
  const activeGroup = filter === "All" ? null : filter.startsWith("group:") ? filter.slice(6) : muscleGroupMap[filter] || null;

  const latest = sessions && sessions.length ? sessions[sessions.length - 1] : null;
  const first = sessions && sessions.length ? sessions[0] : null;

  const deltaFor = (name) => {
    if (!latest || !first || !latest.ex[name] || !first.ex[name]) return null;
    return total(latest.ex[name]) - total(first.ex[name]);
  };

  const sessionVolume = (s) => Object.keys(s.ex).reduce((sum, name) => {
    if (!s.ex[name]) return sum;
    const lpr = effLoadPerRep(s, name);
    return lpr == null ? sum : sum + total(s.ex[name]) * lpr;
  }, 0);

  const volumeKpi = useMemo(() => {
    if (!sessions || !latest || !first) return null;
    const latestVol = sessionVolume(latest);
    const firstVol = sessionVolume(first);
    const cumulative = sessions.reduce((sum, s) => sum + sessionVolume(s), 0);
    return { latestVol, delta: latestVol - firstVol, cumulative };
  }, [sessions, latest, first]);

  const groupVolumeLatest = useMemo(() => {
    if (!latest) return [];
    const totals = {}; GROUPS.forEach((g) => (totals[g] = 0));
    Object.keys(latest.ex).forEach((name) => {
      const lpr = effLoadPerRep(latest, name);
      if (lpr == null) return;
      const group = muscleGroupMap[name] || "Custom";
      if (totals[group] === undefined) totals[group] = 0;
      totals[group] += total(latest.ex[name]) * lpr;
    });
    const grand = Object.values(totals).reduce((a, b) => a + b, 0) || 1;
    return GROUPS.map((g) => ({ group: g, kg: Math.round(totals[g] || 0), pct: Math.round(((totals[g] || 0) / grand) * 100) }));
  }, [latest, muscleGroupMap]);

  // PRs are tracked by TOTAL session volume (all sets for that exercise, summed) rather than a
  // single best set — one big set can flatter a session that was otherwise unremarkable, while
  // total volume reflects the actual work done. Each PR also carries the rep/set breakdown it
  // was built from, plus how many days ago it was set ("PR aging"), so a PR you haven't come
  // close to in months reads differently from one you nearly matched last week.
  // Union of currently-tracked fields and anything ever actually logged, so PRs for an
  // exercise still show up even if it's since been dropped from the tracked list.
  const allExerciseNames = useMemo(() => {
    const set = new Set(trackedExercises);
    (sessions || []).forEach((s) => Object.keys(s.ex).forEach((n) => set.add(n)));
    return Array.from(set);
  }, [sessions, trackedExercises]);

  const prMap = useMemo(() => {
    if (!sessions) return {};
    const map = {};
    allExerciseNames.forEach((name) => {
      let bestVol = -1, bestDate = null, bestSets = null, bestReps = null, priorBest = -1;
      sessions.forEach((s) => {
        if (!s.ex[name]) return;
        const lpr = effLoadPerRep(s, name);
        if (lpr == null) return; // no bodyweight logged for this session — volume unknown, skip
        const reps = total(s.ex[name]);
        const sessionVol = reps * lpr;
        if (!latest || s.id !== latest.id) { if (sessionVol > priorBest) priorBest = sessionVol; }
        if (sessionVol > bestVol) { bestVol = sessionVol; bestDate = s.date; bestSets = s.ex[name].length; bestReps = reps; }
      });
      const latestLpr = latest ? effLoadPerRep(latest, name) : null;
      const latestReps = latest && latest.ex[name] ? total(latest.ex[name]) : null;
      const latestVol = latest && latest.ex[name] && latestLpr != null ? latestReps * latestLpr : -1;
      map[name] = {
        bestVol, bestDate, bestSets, bestReps,
        daysAgo: bestDate ? dayDiff(bestDate, todayStr) : null,
        isNewPR: latest && latestVol > priorBest && latestVol === bestVol,
      };
    });
    return map;
  }, [sessions, latest, todayStr, allExerciseNames]);

  // Fresh (<=13d), aging (14-45d), or stale (46d+) — a quick-glance color for how long ago a
  // PR was actually set, so a shiny "all-time best" number doesn't hide that it's 4 months old.
  const prAgeLabel = (days) => {
    if (days == null) return null;
    if (days <= 13) return { text: `${days}d ago`, color: "#6FCF97" };
    if (days <= 45) return { text: `${days}d ago`, color: "#F2C94C" };
    return { text: `${days}d ago · stale`, color: "#6b7078" };
  };

  const consistency = useMemo(() => {
    if (!sessions || sessions.length === 0) return null;
    const weekKeySet = new Set(sessions.map((s) => toISODate(mondayOf(s.date))));
    const currentMonday = mondayOf(todayStr);
    let streak = 0, firstIter = true;
    let cursor = new Date(currentMonday);
    for (let i = 0; i < 104; i++) {
      const key = toISODate(cursor);
      if (weekKeySet.has(key)) streak++;
      else if (!firstIter) break;
      firstIter = false;
      cursor.setDate(cursor.getDate() - 7);
    }
    const firstMonday = mondayOf(sessions[0].date);
    const weeksSpan = Math.max(1, Math.round((currentMonday - firstMonday) / (7 * 86400000)) + 1);
    const avgPerWeek = (sessions.length / weeksSpan).toFixed(1);
    const thisWeekKey = toISODate(currentMonday);
    const thisWeekCount = sessions.filter((s) => toISODate(mondayOf(s.date)) === thisWeekKey).length;
    const daysSinceLast = dayDiff(sessions[sessions.length - 1].date, todayStr);
    return { streak, avgPerWeek, thisWeekCount, daysSinceLast };
  }, [sessions]);

  const twelveWeekTarget = useMemo(() => {
    if (!sessions || sessions.length === 0 || !first) return null;
    const goalWeeks = (targetSettings && targetSettings.weeks) || 12;
    const startDate = (targetSettings && targetSettings.startDate) || first.date;
    const startMonday = mondayOf(startDate);
    const currentMonday = mondayOf(todayStr);
    const weekKeySet = new Set(sessions.map((s) => toISODate(mondayOf(s.date))));
    let cursor = new Date(startMonday);
    let missedWeeks = 0, trainedWeeks = 0;
    while (cursor < currentMonday) {
      const key = toISODate(cursor);
      if (weekKeySet.has(key)) trainedWeeks++; else missedWeeks++;
      cursor.setDate(cursor.getDate() + 7);
    }
    if (weekKeySet.has(toISODate(currentMonday)) && currentMonday >= startMonday) trainedWeeks++;
    const targetDate = new Date(startMonday);
    targetDate.setDate(targetDate.getDate() + (goalWeeks + missedWeeks) * 7);
    const targetISO = toISODate(targetDate);
    const daysRemaining = Math.max(0, dayDiff(todayStr, targetISO));
    const trainedCapped = Math.min(goalWeeks, trainedWeeks);
    return { targetDate: targetISO, daysRemaining, trainedWeeks: trainedCapped, goalWeeks, missedWeeks, reached: trainedWeeks >= goalWeeks };
  }, [sessions, first, todayStr, targetSettings]);

  const HEATMAP_WEEKS = 24;

  const heatmapWeeks = useMemo(() => {
    if (!sessions) return [];
    const sessionByDate = {};
    sessions.forEach((s) => { sessionByDate[s.date] = s; });
    const currentMonday = mondayOf(todayStr);
    const weeks = [];
    for (let w = HEATMAP_WEEKS - 1; w >= 0; w--) {
      const weekStart = new Date(currentMonday); weekStart.setDate(weekStart.getDate() - w * 7);
      const days = [];
      for (let d = 0; d < 7; d++) {
        const day = new Date(weekStart); day.setDate(day.getDate() + d);
        const iso = toISODate(day);

                    <CartesianGrid stroke="#22262b" vertical={false} /><XAxis dataKey="date" stroke="#6b7078" fontSize={11} /><YAxis stroke="#6b7078" fontSize={11} />

                    <Legend wrapperStyle={{ fontSize: 11, paddingTop: 8, cursor: "pointer" }} onClick={(e) => setChartFocus((cur) => (cur === e.dataKey ? null : e.dataKey))} />
                    {chartExercises.map((name) => (
                      <Line key={name} type="monotone" dataKey={name} stroke={colorsMap[name]} strokeWidth={chartFocus === name ? 3 : 2.2} strokeOpacity={chartFocus && chartFocus !== name ? 0.18 : 1} dot={{ r: 3, fillOpacity: chartFocus && chartFocus !== name ? 0.18 : 1 }} connectNulls />
                    ))}
                    {metric === "volume" && (
                      <Line dataKey="Total" type="monotone" stroke="#F5F3EE" strokeWidth={chartFocus === "Total" ? 3.4 : 2.8} strokeDasharray="5 3" strokeOpacity={chartFocus && chartFocus !== "Total" ? 0.15 : 1} dot={{ r: 3.5, fillOpacity: chartFocus && chartFocus !== "Total" ? 0.15 : 1 }} connectNulls />
                    )}
                  </LineChart>
                ) : filter.startsWith("group:") ? (
                  <LineChart data={groupChartData} margin={{ top: 10, right: 16, left: -10, bottom: 0 }}>
                    <CartesianGrid stroke="#22262b" vertical={false} /><XAxis dataKey="date" stroke="#6b7078" fontSize={11} /><YAxis stroke="#6b7078" fontSize={11} />
                    <Tooltip contentStyle={{ background: "#1d2024", border: "1px solid #2a2e33", borderRadius: 8, fontSize: 12 }} formatter={(v) => [`${v} ${yLabel}`, filter.slice(6)]} />
                    <Line type="monotone" dataKey="value" stroke={GROUP_COLORS[filter.slice(6)]} strokeWidth={2.6} dot={{ r: 3.5 }} connectNulls />
                  </LineChart>
                ) : (
                  <LineChart data={perSetData} margin={{ top: 10, right: 16, left: -10, bottom: 0 }}>
                    <CartesianGrid stroke="#22262b" vertical={false} /><XAxis dataKey="date" stroke="#6b7078" fontSize={11} /><YAxis stroke="#6b7078" fontSize={11} />
                    <Tooltip contentStyle={{ background: "#1d2024", border: "1px solid #2a2e33", borderRadius: 8, fontSize: 12 }} />
                    <Legend wrapperStyle={{ fontSize: 11, paddingTop: 8, cursor: "pointer" }} onClick={(e) => setChartFocus((cur) => (cur === e.dataKey ? null : e.dataKey))} />
                    {Array.from({ length: maxSets }).map((_, i) => {
                      const key = "Set " + (i + 1);
                      return <Line key={i} type="monotone" dataKey={key} stroke={setColor(i)} strokeWidth={chartFocus === key ? 2.4 : 1.6} strokeOpacity={chartFocus && chartFocus !== key ? 0.15 : 0.85} dot={{ r: 2.5, fillOpacity: chartFocus && chartFocus !== key ? 0.15 : 1 }} connectNulls />;
                    })}
                    <Line type="monotone" dataKey="Total" stroke="#F5F3EE" strokeWidth={chartFocus === "Total" ? 3.2 : 2.6} strokeOpacity={chartFocus && chartFocus !== "Total" ? 0.15 : 1} dot={{ r: 3.5, fillOpacity: chartFocus && chartFocus !== "Total" ? 0.15 : 1 }} connectNulls />
                  </LineChart>
                )}
              </ResponsiveContainer>
            </div>

            {chartFocus && (filter === "All" || !filter.startsWith("group:")) && (
              <div style={{ textAlign: "center", marginTop: -8, marginBottom: 10 }}>
                <button onClick={() => setChartFocus(null)} className="mono" style={{ background: "none", border: "none", color: "#6b7078", fontSize: 11, cursor: "pointer", textDecoration: "underline" }}>Show all lines</button>
              </div>
            )}

            {loadableSet.has(filter) && (
              <div style={{ background: "#16181b", border: "1px solid #22262b", borderRadius: 14, padding: "18px 14px 8px", marginBottom: 14 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#c9cdd3", marginBottom: 2, paddingLeft: 8 }}>{filter} — added external load (kg), kept separate from reps</div>
                <div style={{ fontSize: 11, color: "#6b7078", marginBottom: 6, paddingLeft: 8 }}>Shown on its own so reps and load never blend into one misleading number — 12 reps @ +5kg isn't directly comparable to 10 reps @ +15kg.</div>
                <ResponsiveContainer width="100%" height={isMobile ? 120 : 150}>
                  <LineChart data={loadStepData} margin={{ top: 10, right: 16, left: -10, bottom: 0 }}>
                    <CartesianGrid stroke="#22262b" vertical={false} /><XAxis dataKey="date" stroke="#6b7078" fontSize={11} /><YAxis stroke="#6b7078" fontSize={11} />
                    <Tooltip contentStyle={{ background: "#1d2024", border: "1px solid #2a2e33", borderRadius: 8, fontSize: 12 }} />
                    <Line type="stepAfter" dataKey="Added load (kg)" stroke="#E63946" strokeWidth={2.2} dot={{ r: 3 }} connectNulls />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            )}

            <div style={{ background: "#101214", border: "1px dashed #22262b", borderRadius: 10, padding: "10px 14px", fontSize: 11, color: "#6b7078", marginBottom: 8 }}>
              "First logged session" ({first ? fmtDateFull(first.date) : ""}) is just your earliest entry — used only as a fixed reference point for comparisons, not a training assumption.
            </div>
          </>
        )}

        {tab === "history" && (
          <>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
              {!showForm && (
                <button onClick={() => { setDraft(emptyDraft(trackedExercises)); setShowForm(true); }} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", background: "#F2C94C", color: "#101214", border: "none", borderRadius: 10, padding: "10px 16px", fontWeight: 700, fontSize: 13 }}><Plus size={16} /> Log new session</button>
              )}
              <button onClick={exportJSON} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", background: "#16181b", border: "1px solid #22262b", color: "#c9cdd3", borderRadius: 10, padding: "10px 14px", fontWeight: 600, fontSize: 13 }}><Download size={14} /> Export JSON</button>
              <button onClick={exportCSV} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", background: "#16181b", border: "1px solid #22262b", color: "#c9cdd3", borderRadius: 10, padding: "10px 14px", fontWeight: 600, fontSize: 13 }}><Download size={14} /> Export CSV</button>
              <label className="file-btn" style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", background: "#16181b", border: "1px solid #22262b", color: "#c9cdd3", borderRadius: 10, padding: "10px 14px", fontWeight: 600, fontSize: 13 }}>
                <Upload size={14} /> Import JSON
                <input ref={fileInputRef} type="file" accept="application/json" onChange={handleImport} />
              </label>
              {selectedCompare.length === 2 && (
                <button onClick={() => setShowCompare(true)} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", background: "#F2C94C", color: "#101214", border: "none", borderRadius: 10, padding: "10px 14px", fontWeight: 700, fontSize: 13 }}><GitCompare size={14} /> Compare selected</button>
              )}
              {sessions.length > 0 && (
                <button onClick={() => setConfirmDeleteAll(true)} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", background: "#16181b", border: "1px solid #E6394655", color: "#E63946", borderRadius: 10, padding: "10px 14px", fontWeight: 600, fontSize: 13 }}><Trash2 size={14} /> Delete all logs</button>
              )}
            </div>

            {importMsg && (<div style={{ fontSize: 12, color: "#F2C94C", marginBottom: 12 }}>{importMsg}</div>)}
            {selectedCompare.length > 0 && selectedCompare.length < 2 && (<div style={{ fontSize: 12, color: "#6b7078", marginBottom: 12 }}>Select one more session to compare.</div>)}

            {showForm && (
              <div style={{ background: "#16181b", border: "1px solid #2a2e33", borderRadius: 14, padding: 18, marginBottom: 22 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <span style={{ fontWeight: 700, fontSize: 15 }}>{editingId ? "Edit session" : "New session"}</span>
                  <X size={18} style={{ cursor: "pointer", color: "#8a8f98" }} onClick={cancelForm} />
                </div>
                <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap" }}>
                  <div><div style={{ fontSize: 11, color: "#8a8f98", marginBottom: 4 }}>Date</div><input type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} style={{ background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 10px", color: "#E8E6E1", fontSize: 13 }} /></div>
                  <div><div style={{ fontSize: 11, color: "#8a8f98", marginBottom: 4 }}>Bodyweight (kg)</div><input type="number" step="0.1" placeholder="81.9" value={draft.bodyweight} onChange={(e) => setDraft({ ...draft, bodyweight: e.target.value })} className="mono" style={{ width: 90, background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 10px", color: "#E8E6E1", fontSize: 13 }} /></div>
                  <div style={{ flex: 1, minWidth: 160 }}><div style={{ fontSize: 11, color: "#8a8f98", marginBottom: 4 }}>Label (optional)</div><input type="text" placeholder="e.g. Deload week" value={draft.label} onChange={(e) => setDraft({ ...draft, label: e.target.value })} style={{ width: "100%", background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 10px", color: "#E8E6E1", fontSize: 13, boxSizing: "border-box" }} /></div>
                </div>

                <div style={{ background: "#101214", border: "1px dashed #2a2e33", borderRadius: 10, padding: 12, marginBottom: 16 }}>
                  <div style={{ fontSize: 11, color: "#8a8f98", marginBottom: 6 }}>Paste your workout summary — parses it and fills the fields below for you to review</div>
                  <textarea
                    value={pasteText}
                    onChange={(e) => setPasteText(e.target.value)}
                    placeholder={"Wide grip pull ups :\n12 rep x 1 sets body weight\n9 rep x 1 sets body weight\n\nChest dips :\n12 rep x 3 sets body weight + 5kg"}
                    rows={4}
                    className="mono"
                    style={{ width: "100%", background: "#16181b", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 10px", color: "#E8E6E1", fontSize: 12, boxSizing: "border-box", resize: "vertical" }}
                  />
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <button onClick={handleParseFill} style={{ marginTop: 8, background: "#2a2e33", color: "#F5F3EE", border: "none", borderRadius: 8, padding: "8px 14px", fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}>Parse & fill</button>
                    <button onClick={() => setShowLibrary(true)} style={{ marginTop: 8, background: "transparent", color: "#8a8f98", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 14px", fontWeight: 600, fontSize: 12.5, cursor: "pointer" }}>Exercise reference</button>
                    <button onClick={() => setShowAddExercise(true)} style={{ marginTop: 8, background: "transparent", color: "#8a8f98", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 14px", fontWeight: 600, fontSize: 12.5, cursor: "pointer" }}>+ Add exercise</button>
                  </div>
                  {parseNote && <div style={{ fontSize: 11.5, color: "#F2C94C", marginTop: 8, lineHeight: 1.5 }}>{parseNote}</div>}
                </div>

                <div style={{ display: isMobile ? "none" : "grid", gridTemplateColumns: "160px 1fr 90px", gap: 8, marginBottom: 4, fontSize: 10, color: "#5a5f66", textTransform: "uppercase", letterSpacing: "0.04em" }}><span></span><span>Reps per set</span><span>Added kg</span></div>
                <div style={{ display: "grid", gap: isMobile ? 14 : 10, marginBottom: 14 }}>
                  {(editingId ? Object.keys(draft.ex) : trackedExercises.filter((name) => !RETIRED.includes(name))).map((name) => (
                    isMobile ? (
                      <div key={name} style={{ display: "grid", gap: 6, borderBottom: "1px solid #1d2024", paddingBottom: 10 }}>
                        <span style={{ fontSize: 13, color: colorsMap[name] || "#c9cdd3", fontWeight: 600 }}>{name}</span>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 90px", gap: 8 }}>
                          <input type="text" placeholder="e.g. 12,11,9,8" value={draft.ex[name]} onChange={(e) => setDraft({ ...draft, ex: { ...draft.ex, [name]: e.target.value } })} className="mono" style={{ background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "10px 10px", color: "#E8E6E1", fontSize: 14, boxSizing: "border-box" }} />
                          <input type="text" placeholder="+kg" value={draft.load[name]} onChange={(e) => setDraft({ ...draft, load: { ...draft.load, [name]: e.target.value } })} className="mono" style={{ background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "10px 10px", color: "#E8E6E1", fontSize: 14, boxSizing: "border-box" }} />
                        </div>
                      </div>
                    ) : (
                      <div key={name} style={{ display: "grid", gridTemplateColumns: "160px 1fr 90px", gap: 10, alignItems: "center" }}>
                        <span style={{ fontSize: 13, color: colorsMap[name] || "#c9cdd3", fontWeight: 600 }}>{name}</span>
                        <input type="text" placeholder="e.g. 12,11,9,8" value={draft.ex[name]} onChange={(e) => setDraft({ ...draft, ex: { ...draft.ex, [name]: e.target.value } })} className="mono" style={{ background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 10px", color: "#E8E6E1", fontSize: 13, boxSizing: "border-box" }} />
                        <input type="text" placeholder="0" value={draft.load[name]} onChange={(e) => setDraft({ ...draft, load: { ...draft.load, [name]: e.target.value } })} className="mono" style={{ background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 10px", color: "#E8E6E1", fontSize: 13, boxSizing: "border-box" }} />
                      </div>
                    )
                  ))}
                  {trackedExercises.length === 0 && !editingId && (
                    <div style={{ fontSize: 12, color: "#6b7078", fontStyle: "italic" }}>No exercises tracked yet — paste a workout above, or use "+ Add exercise" to add one manually.</div>
                  )}
                </div>
                <div style={{ marginBottom: 4, fontSize: 11, color: "#8a8f98" }}>Notes (optional — soreness, sleep, how it felt)</div>
                <textarea value={draft.notes} onChange={(e) => setDraft({ ...draft, notes: e.target.value })} rows={2} style={{ width: "100%", background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 10px", color: "#E8E6E1", fontSize: 13, boxSizing: "border-box" }} />
                <button onClick={saveSession} disabled={saving} style={{ marginTop: 16, background: "#F2C94C", color: "#101214", border: "none", borderRadius: 8, padding: "10px 20px", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>{saving ? "Saving…" : editingId ? "Update session" : "Save session"}</button>
              </div>
            )}

            <div style={{ background: "#16181b", border: "1px solid #22262b", borderRadius: 14, overflow: "hidden" }}>
              <div style={{ padding: "12px 16px", borderBottom: "1px solid #22262b", fontSize: 13, fontWeight: 600, color: "#c9cdd3" }}>Session history ({sessions.length}) · select up to 2 to compare</div>
              <div style={{ maxHeight: 520, overflowY: "auto" }}>
                {[...sessions].reverse().map((s, idx) => (
                  <div key={s.id} style={{ padding: "12px 16px", borderBottom: idx === sessions.length - 1 ? "none" : "1px solid #1d2024", background: selectedCompare.includes(s.id) ? "#1d2024" : "transparent" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 8 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <input type="checkbox" checked={selectedCompare.includes(s.id)} onChange={() => toggleCompare(s.id)} style={{ cursor: "pointer" }} />
                        <span className="disp" style={{ fontWeight: 700, fontSize: 15, color: "#F5F3EE" }}>{fmtDate(s.date)}</span>
                        <span style={{ fontSize: 12, color: "#6b7078" }}>{s.label}</span>
                        {s.bodyweight != null ? (
                          <span className="mono" style={{ fontSize: 11, color: "#4a4f56" }}>{s.bodyweight} kg</span>
                        ) : bwMap[s.id] != null ? (
                          <span className="mono" style={{ fontSize: 11, color: "#4a4f56", fontStyle: "italic" }}>~{bwMap[s.id]} kg (carried)</span>
                        ) : null}
                      </div>
                      <div style={{ display: "flex", gap: 12, flexShrink: 0 }}>
                        <Pencil size={14} style={{ cursor: "pointer", color: "#5a5f66" }} onClick={() => startEdit(s)} />
                        <Trash2 size={15} style={{ cursor: "pointer", color: "#5a5f66" }} onClick={() => setConfirmDelete(s)} />
                      </div>
                    </div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {Object.keys(s.ex).filter((n) => s.ex[n]).map((name) => (
                        <span key={name} className="mono" style={{ fontSize: 11, padding: "3px 8px", borderRadius: 6, background: `${colorsMap[name] || "#9a9fa6"}14`, color: colorsMap[name] || "#9a9fa6", border: `1px solid ${colorsMap[name] || "#9a9fa6"}33` }}>{name.split(" ")[0]}: {s.ex[name].join("-")}{(s.load || {})[name] ? ` (+${s.load[name]}kg)` : ""}</span>
                      ))}
                    </div>
                    {s.notes && <div style={{ fontSize: 11.5, color: "#6b7078", fontStyle: "italic", marginTop: 6 }}>"{s.notes}"</div>}
                  </div>
                ))}
              </div>
            </div>
          </>
        )}

        <div style={{ textAlign: "center", padding: "20px 0 4px", fontSize: 11, color: "#4a4f56" }} className="mono">Data saved automatically · visible only to you</div>
      </div>

      {confirmDelete && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }}>
          <div style={{ background: "#16181b", border: "1px solid #2a2e33", borderRadius: 14, padding: 20, maxWidth: 360, width: "100%" }}>
            <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
              <AlertTriangle size={20} color="#E63946" style={{ flexShrink: 0 }} />
              <div><div style={{ fontWeight: 700, fontSize: 14, color: "#F5F3EE", marginBottom: 4 }}>Delete this session?</div><div style={{ fontSize: 12.5, color: "#9a9fa6" }}>{fmtDateFull(confirmDelete.date)} — "{confirmDelete.label}" will be permanently removed. This can't be undone.</div></div>
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setConfirmDelete(null)} style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #2a2e33", background: "transparent", color: "#c9cdd3", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
              <button onClick={() => doDelete(confirmDelete.id)} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "#E63946", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {confirmDeleteAll && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }}>
          <div style={{ background: "#16181b", border: "1px solid #2a2e33", borderRadius: 14, padding: 20, maxWidth: 360, width: "100%" }}>
            <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
              <AlertTriangle size={20} color="#E63946" style={{ flexShrink: 0 }} />
              <div><div style={{ fontWeight: 700, fontSize: 14, color: "#F5F3EE", marginBottom: 4 }}>Delete ALL logs?</div><div style={{ fontSize: 12.5, color: "#9a9fa6" }}>All {sessions.length} session(s) will be permanently removed. This can't be undone. Tracked exercises and target settings are kept.</div></div>
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setConfirmDeleteAll(false)} style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #2a2e33", background: "transparent", color: "#c9cdd3", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
              <button onClick={doDeleteAllLogs} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "#E63946", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Delete all</button>
            </div>
          </div>
        </div>
      )}

      {selectedHeatDate && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }} onClick={() => setSelectedHeatDate(null)}>
          <div style={{ background: "#16181b", border: "1px solid #2a2e33", borderRadius: 14, padding: "20px 28px" }} onClick={(e) => e.stopPropagation()}>
            <div className="disp" style={{ fontSize: 20, fontWeight: 700, color: "#F5F3EE" }}>{fmtDateFull(selectedHeatDate)}</div>
          </div>
        </div>
      )}

      {showLibrary && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }} onClick={() => setShowLibrary(false)}>
          <div style={{ background: "#16181b", border: "1px solid #2a2e33", borderRadius: 14, padding: 20, maxWidth: 560, width: "100%", maxHeight: "80vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <span style={{ fontWeight: 700, fontSize: 15, color: "#F5F3EE" }}>Exercise reference</span>
              <X size={18} style={{ cursor: "pointer", color: "#8a8f98" }} onClick={() => setShowLibrary(false)} />
            </div>
            <div style={{ fontSize: 11.5, color: "#6b7078", marginBottom: 14, lineHeight: 1.5 }}>
              Every exercise the paste-parser recognizes, with its bodyweight ratio — the fraction of bodyweight it actually lifts per rep, used to calculate volume ("load only" means the movement has no bodyweight component). Exercises marked <span style={{ color: "#F2C94C", fontWeight: 700 }}>tracked</span> have a field in the entry form. Click "+ track" on any other one to add it directly, or use "Add exercise" if it isn't listed at all.
            </div>
            {GROUPS.map((g) => (
              <div key={g} style={{ marginBottom: 14 }}>
                <div className="mono" style={{ fontSize: 11, fontWeight: 700, color: GROUP_COLORS[g], textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>{g}</div>
                <div style={{ display: "grid", gap: 2 }}>
                  {fullLibrary.filter((e) => e.group === g).map((e) => {
                    const isTracked = trackedExercises.includes(e.name);
                    return (
                      <div key={e.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, padding: "5px 0", borderBottom: "1px solid #1d2024" }}>
                        <span style={{ color: isTracked ? "#F5F3EE" : "#9a9fa6", display: "flex", alignItems: "center", gap: 6 }}>
                          {e.name}
                          {isTracked && <span className="mono" style={{ fontSize: 9, fontWeight: 700, color: "#F2C94C", border: "1px solid #F2C94C55", borderRadius: 999, padding: "1px 6px" }}>tracked</span>}
                        </span>
                        <span style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                          <span className="mono" style={{ color: "#6b7078" }}>{e.ratio === 0 ? "load only" : `${Math.round(e.ratio * 100)}% BW`}</span>
                          {!isTracked && (
                            <button onClick={() => trackLibraryExercise(e.name)} className="mono" style={{ fontSize: 10, fontWeight: 700, color: "#F2C94C", background: "transparent", border: "1px solid #F2C94C55", borderRadius: 999, padding: "2px 8px", cursor: "pointer" }}>+ track</button>
                          )}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
            <button onClick={() => { setShowLibrary(false); setShowAddExercise(true); }} style={{ marginTop: 4, width: "100%", background: "#2a2e33", color: "#F5F3EE", border: "none", borderRadius: 8, padding: "10px 14px", fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}>+ Add an exercise not listed here</button>
          </div>
        </div>
      )}

      {showAddExercise && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }} onClick={() => setShowAddExercise(false)}>
          <div style={{ background: "#16181b", border: "1px solid #2a2e33", borderRadius: 14, padding: 20, maxWidth: 400, width: "100%" }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <span style={{ fontWeight: 700, fontSize: 15, color: "#F5F3EE" }}>Add an exercise</span>
              <X size={18} style={{ cursor: "pointer", color: "#8a8f98" }} onClick={() => setShowAddExercise(false)} />
            </div>
            <div style={{ fontSize: 11.5, color: "#6b7078", marginBottom: 14, lineHeight: 1.5 }}>
              For anything not in the built-in reference library. It's added to the entry form immediately and remembered for future paste-parsing.
            </div>
            <div style={{ display: "grid", gap: 10 }}>
              <div>
                <div style={{ fontSize: 11, color: "#8a8f98", marginBottom: 4 }}>Name</div>
                <input type="text" placeholder="e.g. Archer Pull-Ups" value={addExDraft.name} onChange={(e) => setAddExDraft({ ...addExDraft, name: e.target.value })} style={{ width: "100%", background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 10px", color: "#E8E6E1", fontSize: 13, boxSizing: "border-box" }} />
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, color: "#8a8f98", marginBottom: 4 }}>Muscle group</div>
                  <select value={addExDraft.group} onChange={(e) => setAddExDraft({ ...addExDraft, group: e.target.value })} style={{ width: "100%", background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 10px", color: "#E8E6E1", fontSize: 13 }}>
                    {GROUPS.map((g) => <option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
                <div style={{ width: 110 }}>
                  <div style={{ fontSize: 11, color: "#8a8f98", marginBottom: 4 }}>BW ratio</div>
                  <input type="number" step="0.05" min="0" max="1.5" value={addExDraft.ratio} onChange={(e) => setAddExDraft({ ...addExDraft, ratio: e.target.value })} className="mono" style={{ width: "100%", background: "#101214", border: "1px solid #2a2e33", borderRadius: 8, padding: "8px 10px", color: "#E8E6E1", fontSize: 13, boxSizing: "border-box" }} />
                </div>
              </div>
              <div style={{ fontSize: 10.5, color: "#4a4f56" }}>Ratio = fraction of bodyweight lifted per rep. Use 0 for a pure-load exercise (barbell/machine).</div>
              <button onClick={addCustomExercise} disabled={!addExDraft.name.trim()} style={{ marginTop: 4, background: "#F2C94C", color: "#101214", border: "none", borderRadius: 8, padding: "10px 16px", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Add exercise</button>
            </div>
          </div>
        </div>
      )}

      {showCompare && compareSessions && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }} onClick={() => setShowCompare(false)}>
          <div style={{ background: "#16181b", border: "1px solid #2a2e33", borderRadius: 14, padding: 20, maxWidth: 560, width: "100%", maxHeight: "80vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <span style={{ fontWeight: 700, fontSize: 15, color: "#F5F3EE" }}>Session comparison</span>
              <X size={18} style={{ cursor: "pointer", color: "#8a8f98" }} onClick={() => setShowCompare(false)} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#6b7078", marginBottom: 12 }}>
              <span className="mono">{fmtDateFull(compareSessions[0].date)}</span><span className="mono">{fmtDateFull(compareSessions[1].date)}</span>
            </div>
            {compareSessions[0].bodyweight != null && compareSessions[1].bodyweight != null && (
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, padding: "8px 0", borderBottom: "1px solid #22262b", marginBottom: 8 }}>
                <span style={{ color: "#9a9fa6" }}>Bodyweight</span>
                <span className="mono" style={{ color: "#F5F3EE" }}>{compareSessions[0].bodyweight}kg → {compareSessions[1].bodyweight}kg ({(compareSessions[1].bodyweight - compareSessions[0].bodyweight >= 0 ? "+" : "") + (compareSessions[1].bodyweight - compareSessions[0].bodyweight).toFixed(1)}kg)</span>
              </div>
            )}
            <div style={{ display: "grid", gap: 10 }}>
              {Array.from(new Set([...Object.keys(compareSessions[0].ex), ...Object.keys(compareSessions[1].ex)])).filter((name) => compareSessions[0].ex[name] || compareSessions[1].ex[name]).map((name) => {
                const a = compareSessions[0], b = compareSessions[1];
                const repsA = a.ex[name] ? total(a.ex[name]) : null, repsB = b.ex[name] ? total(b.ex[name]) : null;
                const volA = a.ex[name] && effLoadPerRep(a, name) != null ? Math.round(repsA * effLoadPerRep(a, name)) : null;
                const volB = b.ex[name] && effLoadPerRep(b, name) != null ? Math.round(repsB * effLoadPerRep(b, name)) : null;
                return (
                  <div key={name} style={{ padding: "10px 0", borderBottom: "1px solid #1d2024" }}>
                    <div style={{ fontSize: 12.5, fontWeight: 700, color: colorsMap[name] || "#c9cdd3", marginBottom: 6 }}>{name}</div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#c9cdd3", marginBottom: 3 }}>
                      <span>{a.ex[name] ? a.ex[name].join("-") : "—"}</span>
                      <span className="mono">{repsA != null && repsB != null ? ((repsB - repsA >= 0 ? "+" : "") + (repsB - repsA) + " reps") : ""}</span>
                      <span>{b.ex[name] ? b.ex[name].join("-") : "—"}</span>
                    </div>
                    {volA != null && volB != null && (<div style={{ fontSize: 11, color: "#6b7078", textAlign: "right" }}>{volA}kg → {volB}kg ({(volB - volA >= 0 ? "+" : "") + (volB - volA)}kg)</div>)}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TrainingLog />);


</script>
